[pytest]
# PYTHONPATH añade el directorio padre para que `import demo_2.transformations.*` funcione
# desde dentro de demo-2/ cuando corras `pytest tests/`.
pythonpath = .. .

testpaths = tests

# Marcas y opciones por defecto
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider

# Filtros de warnings ruidosos de PySpark
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning