site_name: DKOps
site_description: Lakehouse automation framework for DataOps on Databricks
site_author: Roberto
repo_url: https://github.com/brrsanchezfi/BigDataFrameworkSpark
repo_name: brrsanchezfi/DKOps

theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search:
      lang: es
  - mkdocstrings:
      handlers:
        python:
          paths: [src]                    # ← donde vive DKOps
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_category_heading: true
            members_order: source
            heading_level: 2
            show_if_no_docstring: true    # ← muestra aunque no tenga docstring

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Inicio: index.md
  - Guía de uso:
    - Quickstart: guide/quickstart.md
    - Contratos de tabla: guide/contracts.md
    - Writers: guide/writers.md
    - Readers: guide/readers.md
    - Migraciones: guide/migrations.md
    - Arquitectura: guide/architecture.md
  - API Reference:
    - Core:
      - Launcher: api/launcher.md
      - EnvironmentConfig: api/environment_config.md
      - LoggerConfig: api/logger_config.md
    - Contracts:
      - loader: api/contracts/loader.md
      - validator: api/contracts/validator.md
    - Writers:
      - table_writer: api/writers/table_writer.md
      - base_writer: api/writers/base.md
      - create_writer: api/writers/create.md
      - append_writer: api/writers/append.md
      - upsert_writer: api/writers/upsert.md
      - partition_writer: api/writers/partition.md
      - delete_writer: api/writers/delete.md
    - Readers:
      - table_reader: api/readers/table_reader.md
    - Migrations:
      - safe_migrator: api/migrations/safe_migrator.md
